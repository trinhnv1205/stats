name: build artifact

# Builds an UNSIGNED Stats.app and uploads it as a downloadable artifact.
# Note: because the build is unsigned, fan control (which installs a privileged
# SMC helper via SMJobBless) will not work — that requires a code-signed build.
# The rest of the app runs after clearing quarantine (right click -> Open).

on:
  workflow_dispatch:
  push:
    branches:
      - claude/adoring-lamport-la04ho

concurrency:
  group: artifact-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # Newest macOS image: the codebase uses recent SDK symbols (e.g. Wi-Fi 7
    # CWPHYMode.mode11be, M5 sensors), which the older runner's Xcode lacks.
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1 || true)
          if [ -n "$latest" ]; then sudo xcode-select -s "$latest/Contents/Developer"; fi
          xcodebuild -version
          echo "macOS SDK: $(xcrun --show-sdk-version)"

      - name: Archive (unsigned)
        run: |
          xcodebuild \
            -scheme Stats \
            -destination 'platform=macOS' \
            -configuration Release archive \
            -archivePath build/Stats.xcarchive \
            CODE_SIGNING_ALLOWED=NO

      - name: Zip app
        run: ditto -c -k --keepParent "build/Stats.xcarchive/Products/Applications/Stats.app" "Stats-unsigned.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Stats-unsigned
          path: Stats-unsigned.zip
          if-no-files-found: error
